name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: oci-ping-cli/go.sum

      - name: Build Mac ARM
        run: |
          cd oci-ping-cli
          GOOS=darwin GOARCH=arm64 go build -o ../oci-ping-cli-darwin-arm64

      - name: Build Windows x64
        run: |
          cd oci-ping-cli
          GOOS=windows GOARCH=amd64 go build -o ../oci-ping-cli-win-x64.exe

      - name: Build Linux x64
        run: |
          cd oci-ping-cli
          GOOS=linux GOARCH=amd64 go build -o ../oci-ping-cli-linux-x64

      - name: Build Linux ARM64
        run: |
          cd oci-ping-cli
          GOOS=linux GOARCH=arm64 go build -o ../oci-ping-cli-linux-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            oci-ping-cli-darwin-arm64
            oci-ping-cli-win-x64.exe
            oci-ping-cli-linux-x64
            oci-ping-cli-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
