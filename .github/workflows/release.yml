name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: oci-ping-cli/go.sum

      - name: Build Mac ARM
        run: |
          cd oci-ping-cli
          GOOS=darwin GOARCH=arm64 go build -o ../oci-ping-cli-mac-arm

      - name: Build Windows x64
        run: |
          cd oci-ping-cli
          GOOS=windows GOARCH=amd64 go build -o ../oci-ping-cli-win-x64.exe

      - name: Build Linux x64
        run: |
          cd oci-ping-cli
          GOOS=linux GOARCH=amd64 go build -o ../oci-ping-cli-linux-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            oci-ping-cli-mac-arm
            oci-ping-cli-win-x64.exe
            oci-ping-cli-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
